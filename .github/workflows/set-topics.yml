name: Debug Topics API

on:
  push:
    branches: [main]

permissions: write-all

jobs:
  debug-topics:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Debug token and permissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Token info ==="
          gh auth status 2>&1 || true
          echo "=== Current user ==="
          gh api user --jq '.login' 2>&1 || true
          echo "=== Try topics API ==="
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/topics \
            -f 'names[]=perplexity-super-skill' 2>&1 || true
          echo "=== Current topics ==="  
          gh api /repos/${{ github.repository }}/topics 2>&1 || true
