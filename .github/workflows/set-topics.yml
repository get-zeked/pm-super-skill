name: Set Repository Topics

on:
  push:
    branches: [main]

jobs:
  set-topics:
    runs-on: ubuntu-latest
    steps:
      - name: Set topics via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/topics \
            -f 'names[]=perplexity-super-skill'
          echo "Topics set!"
