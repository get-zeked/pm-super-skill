name: Set Topics and Save Output

on:
  push:
    branches: [main]

permissions: write-all

jobs:
  set-topics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Try to set topics and capture output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Token info ===" > /tmp/debug_output.txt
          gh auth status 2>&1 >> /tmp/debug_output.txt || true
          echo "" >> /tmp/debug_output.txt
          echo "=== PUT topics API call ===" >> /tmp/debug_output.txt
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/topics \
            -f 'names[]=perplexity-super-skill' 2>&1 >> /tmp/debug_output.txt || true
          echo "" >> /tmp/debug_output.txt
          echo "=== Current topics ===" >> /tmp/debug_output.txt
          gh api /repos/${{ github.repository }}/topics 2>&1 >> /tmp/debug_output.txt || true
          cat /tmp/debug_output.txt
          
      - name: Save debug output to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat /tmp/debug_output.txt > debug_output.txt
          git config --global user.email 'github-actions@github.com'
          git config --global user.name 'GitHub Actions'
          git add debug_output.txt
          git commit -m 'Debug: save API output' --allow-empty
          git push
