name: Set Repository Topics

on:
  push:
    branches: [main]

permissions: write-all

jobs:
  set-topics:
    runs-on: ubuntu-latest
    steps:
      - name: Set topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Attempting to set topics..."
          result=$(gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/topics \
            -f 'names[]=perplexity-super-skill' 2>&1)
          echo "Result: $result"
